<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cyber Space</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{

      height:100vh;

      display:flex;
      justify-content:center;
      align-items:center;

      background:black;

      overflow:hidden;

      font-family:monospace;

      color:#00ff99;
    }

    .background{

      position:absolute;

      width:100%;
      height:100%;

      background:
      radial-gradient(circle at top left,#00ff9940,transparent 30%),
      radial-gradient(circle at bottom right,#00ffff30,transparent 30%);

      animation:pulse 4s infinite alternate;
    }

    .terminal{

      position:relative;

      z-index:2;

      width:360px;

      padding:35px;

      border:2px solid #00ff99;

      border-radius:18px;

      background:rgba(0,0,0,0.8);

      box-shadow:
      0 0 20px #00ff99,
      0 0 40px #00ff9950;

      text-align:center;
    }

    h1{

      font-size:38px;

      margin-bottom:20px;

      text-shadow:0 0 10px #00ff99;
    }

    p{

      font-size:17px;

      line-height:1.6;

      margin-bottom:30px;

      color:#9affd2;
    }

    button{

      padding:14px 24px;

      border:none;

      border-radius:10px;

      background:#00ff99;

      color:black;

      font-size:17px;

      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    button:hover{

      transform:scale(1.08);

      box-shadow:0 0 15px #00ff99;
    }

    @keyframes pulse{

      from{
        opacity:0.5;
      }

      to{
        opacity:1;
      }
    }

  </style>

</head>

<body>

  <div class="background"></div>

  <div class="terminal">

    <h1>ACCESS GRANTED</h1>

    <p>
      Welcome to the second dimension of your website.<br>
      This page has a cyberpunk hacker-style interface.
    </p>

    <button onclick="goBack()">
      RETURN
    </button>

  </div>

  <script>

    function goBack(){

      window.location.href = "index.html";

    }

  </script>

</body>

</html>
